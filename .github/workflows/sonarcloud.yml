name: SonarCloud

on:
  push:
    paths:
      - "cinelink-backend/**"
      - "cinelink-frontend/**"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "cinelink-backend/**"
      - "cinelink-frontend/**"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      JWT_SECRET: test_jwt_secret
      JWT_EXPIRES_IN: 1h
      MONGO_URI: mongodb://localhost:27017/cinelink_test
      TMDB_API_KEY: dummy
      FRONTEND_URL: http://localhost:5173

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cinelink-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: cinelink-backend
        run: npm ci

      - name: Run backend tests with coverage
        working-directory: cinelink-backend
        run: npm run test:coverage

      - name: Typecheck backend tests
        working-directory: cinelink-backend
        run: npm run typecheck:test

      - name: Build backend
        working-directory: cinelink-backend
        run: npm run build

      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cinelink-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: cinelink-frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: cinelink-frontend
        run: npm run lint

      - name: Run frontend tests with coverage
        working-directory: cinelink-frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: cinelink-frontend
        run: npm run build

      - name: Run SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
