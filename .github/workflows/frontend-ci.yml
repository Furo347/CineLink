name: Frontend CI

on:
  push:
    paths:
      - "cinelink-frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "cinelink-frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cinelink-frontend/package-lock.json

      - name: Install dependencies
        working-directory: cinelink-frontend
        run: npm ci

      - name: Run lint
        working-directory: cinelink-frontend
        run: npm run lint

      - name: Run tests
        working-directory: cinelink-frontend
        run: npm test

      - name: Build project
        working-directory: cinelink-frontend
        run: npm run build
