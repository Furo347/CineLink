name: Frontend CI

on:
  push:
    paths:
      - "cinelink-frontend/**"
  pull_request:
    paths:
      - "cinelink-frontend/**"

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cinelink-frontend/package-lock.json

      - name: Install dependencies
        working-directory: cinelink-frontend
        run: npm ci

      - name: Build project
        working-directory: cinelink-frontend
        run: npm run build
